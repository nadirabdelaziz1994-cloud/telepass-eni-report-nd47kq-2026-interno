<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Telepass ENI</title><style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#10243e;--muted:#5d6b82;--line:#d7dfeb;--blue:#123764;--green:#138a36;--orange:#b4690e;--red:#c62828}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.top{position:sticky;top:0;background:var(--blue);color:#fff;padding:14px 16px;font-weight:900;z-index:10}
.wrap{max-width:1280px;margin:0 auto;padding:14px}
.grid{display:grid;gap:12px}
.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
h1,h2,h3{margin:0 0 8px}
.kpi{font-size:34px;font-weight:900}
.muted{color:var(--muted)}
.filters{grid-template-columns:2fr repeat(4,minmax(0,1fr));align-items:center}
input,select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#fff}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}
table{border-collapse:collapse;width:100%;min-width:1200px}
th,td{padding:9px 10px;border-bottom:1px solid #e9eef6;text-align:left;font-size:13px}
th{position:sticky;top:0;background:#eef4fb}
.num{text-align:right}
.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-weight:800;font-size:12px}
.bene{background:#e8f7ec;color:var(--green)}
.da-seguire{background:#fff4e5;color:var(--orange)}
.male{background:#fdeceb;color:var(--red)}
.section{margin-top:14px}
.links a{display:inline-block;margin:6px 8px 0 0;padding:10px 12px;border-radius:12px;background:#edf4ff;color:#114e96;text-decoration:none;font-weight:700}
.small{font-size:12px}
@media (max-width:900px){
  .kpis,.filters{grid-template-columns:1fr 1fr}
  .filters > :first-child{grid-column:1 / -1}
}
</style></head><body><div class="top">Telepass ENI</div><div class="wrap"><div class="grid kpis"><div class="card"><div class="small muted">Totale vendite 2026</div><div class="kpi" id="kSales">-</div></div><div class="card"><div class="small muted">Totale prospect 2026</div><div class="kpi" id="kProspect">-</div></div><div class="card"><div class="small muted">Totale assistenze 2026</div><div class="kpi" id="kAssist">-</div></div><div class="card"><div class="small muted">PDV visibili</div><div class="kpi" id="kCount">-</div></div></div><div class="card section"><div class="grid filters"><input id="q" placeholder="Cerca PDV, città, agente, CR, RZV..." oninput="render()"><select id="agent" onchange="render()"></select><select id="cr" onchange="render()"></select><select id="rzv" onchange="render()"></select><select id="status" onchange="render()"><option value="">Tutti gli stati</option><option value="Bene">Bene</option><option value="Da seguire">Da seguire</option><option value="Male">Male</option></select></div><div class="small muted" style="margin-top:10px">
      Settimana corrente: <b>W__CURRENT_WEEK__</b> · Generato il <span id="generatedAt"></span></div></div><div class="card section"><h3>Classifica PDV</h3><div class="table-wrap"><table><thead><tr><th class="num">#</th><th>PDV</th><th>Città</th><th>Agente</th><th>CR</th><th>RZV</th><th class="num">Vend 2026</th><th class="num">Vend 2025</th><th class="num">Prospect</th><th class="num">Twin</th><th class="num">Business</th><th class="num">Ass 2026</th><th class="num">Ass 2025</th><th class="num">W corr. vend</th><th class="num">W corr. assist</th><th>Stato</th></tr></thead><tbody id="rows"></tbody></table></div></div><div class="card section"><h3>Gare PDV</h3><div id="garePdv" class="small"></div></div><div class="card section"><h3>File utili</h3><div id="files" class="links"></div></div></div><script>
const APP = __DATA_JSON__;
const DATA = APP.rows || [];

function fmtNum(v){
  if(v===null || v===undefined || v==='') return '-';
  return Number(v).toLocaleString('it-IT');
}
function esc(s){
  return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
}
function badge(s){
  const cls = (s||'').toLowerCase().replaceAll(' ','-');
  return `<span class="badge ${cls}">${esc(s || '-')}</span>`;
}
function uniques(key){
  return [...new Set(DATA.map(r => r[key]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'it'));
}
function fill(id, label, values){
  document.getElementById(id).innerHTML =
    `<option value="">${label}</option>` +
    values.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
}
function filtered(){
  const q = (document.getElementById('q').value || '').toLowerCase().trim();
  const agent = document.getElementById('agent').value;
  const cr = document.getElementById('cr').value;
  const rzv = document.getElementById('rzv').value;
  const status = document.getElementById('status').value;
  return DATA.filter(r => {
    if(agent && r.agent !== agent) return false;
    if(cr && r.cr !== cr) return false;
    if(rzv && r.rzv !== rzv) return false;
    if(status && r.status !== status) return false;
    if(q){
      const hay = `${r.pdv} ${r.city} ${r.agent} ${r.cr} ${r.rzv} ${r.address}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function renderKpis(rows){
  document.getElementById('kSales').textContent = fmtNum(rows.reduce((a,r)=>a+(r.ytd?.sales_2026||0),0));
  document.getElementById('kProspect').textContent = fmtNum(rows.reduce((a,r)=>a+(r.ytd?.prospect||0),0));
  document.getElementById('kAssist').textContent = fmtNum(rows.reduce((a,r)=>a+(r.ytd?.assist_2026||0),0));
  document.getElementById('kCount').textContent = fmtNum(rows.length);
}
function renderTable(rows){
  const tb = document.getElementById('rows');
  tb.innerHTML = rows.map(r => `<tr><td class="num">${fmtNum(r.rank_sales)}</td><td><b>${esc(r.pdv)}</b></td><td>${esc(r.city)}</td><td>${esc(r.agent)}</td><td>${esc(r.cr)}</td><td>${esc(r.rzv)}</td><td class="num"><b>${fmtNum(r.ytd?.sales_2026)}</b></td><td class="num">${fmtNum(r.ytd?.sales_2025)}</td><td class="num">${fmtNum(r.ytd?.prospect)}</td><td class="num">${fmtNum(r.ytd?.twin)}</td><td class="num">${fmtNum(r.ytd?.business)}</td><td class="num"><b>${fmtNum(r.ytd?.assist_2026)}</b></td><td class="num">${fmtNum(r.ytd?.assist_2025)}</td><td class="num">${fmtNum(r.latest?.sales_total)}</td><td class="num">${fmtNum(r.latest?.assist)}</td><td>${badge(r.status)}</td></tr>`).join('');
  if(!rows.length){
    tb.innerHTML = `<tr><td colspan="16">Nessun PDV trovato con i filtri attivi.</td></tr>`;
  }
}
function renderGare(){
  const wrap = document.getElementById('garePdv');
  const gare = APP.gare_pdv || [];
  if(!gare.length){
    wrap.innerHTML = 'Nessuna gara disponibile.';
    return;
  }
  wrap.innerHTML = gare.map(g => {
    const count = (g.table || []).length;
    return `<div style="margin-bottom:10px"><b>${esc(g.title || 'Gara')}</b>${g.updated_at ? ` · aggiornato al ${esc(g.updated_at)}` : ''}${g.file_name ? ` · ${esc(g.file_name)}` : ''}<br><span class="muted">Righe disponibili: ${fmtNum(count)}</span></div>`;
  }).join('');
}
function renderFiles(){
  const wrap = document.getElementById('files');
  const files = APP.file_utili || [];
  if(!files.length){
    wrap.innerHTML = '<span class="muted">Nessun file disponibile.</span>';
    return;
  }
  wrap.innerHTML = files.map(f => `<a href="${encodeURI(f.path)}" download>${esc(f.name)}</a>`).join('');
}
function render(){
  const rows = filtered();
  renderKpis(rows);
  renderTable(rows);
}
fill('agent', 'Agente · tutti', uniques('agent'));
fill('cr', 'CR · tutti', uniques('cr'));
fill('rzv', 'RZV · tutti', uniques('rzv'));
document.getElementById('generatedAt').textContent = APP.meta?.generated_at || '-';
renderGare();
renderFiles();
render();
</script></body></html>
