name: Rebuild dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'input/report_settimanali/**'
      - 'input/custom_report/**'
      - 'input/lista/**'
      - 'input/anagrafica/**'
      - 'FILE_UTILI/**'
      - 'config_dashboard.json'
      - 'template_dashboard.html'
      - 'aggiorna_dashboard.py'
      - 'aggiorna_dashboard_github.py'
      - 'build_github.py'
      - '.github/workflows/rebuild_dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build dashboard
        run: python build_github.py

      - name: Commit generated site
        run: |
          if [ -n "$(git status --porcelain docs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs
            git commit -m "Auto-update dashboard"
            git push
          else
            echo "Nessuna modifica da pubblicare"
          fi
